<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Integration - 輕鬆規劃行程，一鍵開始！</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --primary-color: #FFD966;
            --primary-light: #FFF9E6;
            --bg-color: #FCFBF7;
            --text-color: #5D534A;
            --card-bg: #FFFFFF;
            --accent-color: #E29578;
            --danger-color: #E63946;
            --success-color: #A3B18A;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background-color: var(--primary-light);
            padding: 25px 40px;
            border-radius: 20px;
            box-shadow: 0 8px 0 var(--primary-color);
            border: 3px solid var(--text-color);
            max-width: 600px;
            width: 100%;
        }

        header h1 {
            font-size: 2.2rem;
            color: var(--text-color);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        header p {
            font-size: 1.1rem;
            color: #7A6F64;
            font-weight: bold;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 25px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border: 3px solid var(--text-color);
            border-radius: 18px;
            padding: 20px;
            box-shadow: 5px 5px 0 var(--text-color);
        }

        h2 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px dashed var(--primary-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 0.95rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--text-color);
            border-radius: 10px;
            font-size: 1rem;
            background-color: #FFF;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            background-color: var(--primary-light);
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            border: 2px solid var(--text-color);
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 var(--text-color);
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 var(--text-color);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--text-color);
        }

        .spot-list-item {
            background: var(--primary-light);
            border: 2px solid var(--text-color);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            background: var(--danger-color);
            color: white;
            border: 2px solid var(--text-color);
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 2px 0 var(--text-color);
            width: auto;
            margin-top: 0;
        }

        /* 行程時間軸樣式 */
        .timeline-box {
            background: white;
            padding: 10px;
            border-radius: 12px;
        }

        .timeline {
            position: relative;
            padding-left: 20px;
            margin-top: 15px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 5px;
            top: 10px;
            bottom: 10px;
            width: 4px;
            background: var(--primary-color);
            border-radius: 2px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 25px;
            padding-left: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .timeline-item::before {
            content: '●';
            position: absolute;
            left: -20px;
            color: var(--accent-color);
            font-size: 1.2rem;
            background: var(--card-bg);
            z-index: 2;
        }

        .timeline-content {
            flex-grow: 1;
            padding-right: 10px;
        }

        .time-tag {
            background: var(--text-color);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .warning {
            color: var(--danger-color);
            font-weight: bold;
            font-size: 0.85rem;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 調整順序按鈕群組 */
        .order-actions {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .order-btn {
            background: white;
            border: 2px solid var(--text-color);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 0 2px 0 var(--text-color);
            width: auto;
            margin-top: 0;
        }
        .order-btn:hover { background: var(--primary-light); }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .maps-btn {
            background-color: #4285F4;
            color: white;
        }
        .maps-btn:hover { background-color: #357ae8; }

        .jpg-btn {
            background-color: var(--accent-color);
            color: white;
        }
        .jpg-btn:hover { filter: brightness(0.9); }

        .tip-text {
            font-size: 0.85rem;
            color: #888;
            margin-top: 4px;
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-compass" style="color: var(--accent-color);"></i> Map Integration</h1>
        <p>輕鬆規劃行程，一鍵開始！</p>
    </header>

    <div class="container">
        <div class="space-y" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="card">
                <h2><i class="fa-solid fa-calendar-days"></i> 1. 設定旅遊時間</h2>
                <div class="form-group">
                    <label for="trip-date">旅遊日期</label>
                    <input type="date" id="trip-date" value="2026-07-01">
                </div>
                <div class="form-group">
                    <label for="start-time">出發時間 (依此自動推算行程)</label>
                    <input type="time" id="start-time" value="09:00">
                </div>
            </div>

            <div class="card">
                <h2><i class="fa-solid fa-map-location-dot"></i> 2. 匯入 Google Map 景點</h2>
                
                <div class="form-group">
                    <label for="map-url">Google Map 共用地圖連結</label>
                    <input type="text" id="map-url" placeholder="https://maps.app.goo.gl/... 或 https://www.google.com/maps/d/...">
                    <p class="tip-text">*因瀏覽器安全限制，請在下方文字框貼上地圖內想去的景點名稱清單（一行一個）。</p>
                </div>

                <div class="form-group">
                    <label for="bulk-spots">景點名稱列表 (支援批量輸入)</label>
                    <textarea id="bulk-spots" placeholder="例如：&#10;台中歌劇院&#10;逢甲夜市&#10;宮原眼科"></textarea>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>統一預設營業開始</label>
                        <input type="time" id="default-open" value="09:00">
                    </div>
                    <div class="form-group">
                        <label>統一預設營業結束</label>
                        <input type="time" id="default-close" value="21:00">
                    </div>
                </div>

                <div class="form-group">
                    <label for="default-duration">預估停留時間</label>
                    <select id="default-duration">
                        <option value="30">30 分鐘</option>
                        <option value="60" selected>1 小時</option>
                        <option value="90">1.5 小時</option>
                        <option value="120">2 小時</option>
                    </select>
                </div>

                <button type="button" onclick="importBulkSpots()"><i class="fa-solid fa-file-import"></i> 解析並加入待排清單</button>
            </div>
        </div>

        <div class="space-y" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="card">
                <h2><i class="fa-solid fa-list-ul"></i> 候選景點清單</h2>
                <div id="spot-list">
                    <p style="color: #999; text-align: center; padding: 20px;">尚未解析或加入任何景點</p>
                </div>
                <button type="button" onclick="generateItinerary()" style="background-color: var(--success-color); color: white;"><i class="fa-solid fa-wand-magic-sparkles"></i> 智慧生成最佳順路行程</button>
            </div>

            <div class="card" id="itinerary-card">
                <h2><i class="fa-solid fa-route"></i> Map Integration 行程路線表</h2>
                <div id="trip-info-header" style="margin-bottom: 10px; font-weight: bold; color: #7A6F64; display:none;"></div>
                
                <div id="itinerary-result" class="timeline-box">
                    <p style="color: #999; text-align: center; padding: 20px;">請點擊上方「智慧生成」按鈕</p>
                </div>

                <div class="action-buttons">
                    <button id="open-maps-btn" class="maps-btn" style="display: none;" onclick="openGoogleMaps()"><i class="fa-solid fa-map-location-dot"></i> 一鍵開啟 Google Maps 導航</button>
                    <button id="download-jpg-btn" class="jpg-btn" style="display: none;" onclick="downloadItineraryJPG()"><i class="fa-solid fa-image"></i> 另存行程表圖 (JPG) 離線查看</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let spots = [];

        // 批量解析並匯入景點
        function importBulkSpots() {
            const bulkText = document.getElementById('bulk-spots').value.trim();
            const openTime = document.getElementById('default-open').value;
            const closeTime = document.getElementById('default-close').value;
            const duration = parseInt(document.getElementById('default-duration').value);

            if (!bulkText) {
                alert('請在景點名稱列表框中輸入至少一個景點！');
                return;
            }

            // 依換行拆分，並過濾掉空行
            const lines = bulkText.split('\n').map(line => line.trim()).filter(line => line.length > 0);

            lines.forEach(name => {
                const spot = {
                    id: Date.now() + Math.random(), // 確保唯一 ID
                    name,
                    openTime,
                    closeTime,
                    duration
                };
                spots.push(spot);
            });

            document.getElementById('bulk-spots').value = ''; // 清空輸入
            renderSpotList();
        }

        // 刪除候選景點
        function deleteSpot(id) {
            spots = spots.filter(spot => spot.id !== id);
            renderSpotList();
        }

        // 渲染左下候選名單
        function renderSpotList() {
            const listContainer = document.getElementById('spot-list');
            if (spots.length === 0) {
                listContainer.innerHTML = `<p style="color: #999; text-align: center; padding: 20px;">尚未解析或加入任何景點</p>`;
                return;
            }

            listContainer.innerHTML = spots.map(spot => `
                <div class="spot-list-item">
                    <div>
                        <strong>${spot.name}</strong> <br>
                        <small style="color: #777;"><i class="fa-regular fa-clock"></i> 營業: ${spot.openTime}-${spot.closeTime} | 停留 ${spot.duration}分</small>
                    </div>
                    <button class="delete-btn" onclick="deleteSpot(${spot.id})"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        }

        // 智慧生成行程與時間序列推算
        function generateItinerary() {
            if (spots.length === 0) {
                alert('候選景點清單是空的，請先匯入景點！');
                return;
            }

            // 更新行程表頂部日期資訊
            const tripDate = document.getElementById('trip-date').value;
            const tripHeader = document.getElementById('trip-info-header');
            tripHeader.innerText = `旅遊日期：${tripDate}`;
            tripHeader.style.display = 'block';

            const startTimeInput = document.getElementById('start-time').value;
            let [currentHour, currentMinute] = startTimeInput.split(':').map(Number);
            
            let timelineHtml = `<div class="timeline">`;
            
            spots.forEach((spot, index) => {
                let arrivalTimeStr = `${String(currentHour).padStart(2, '0')}:${String(currentMinute).padStart(2, '0')}`;
                const isOpenned = checkInOpeningHours(arrivalTimeStr, spot.openTime, spot.closeTime);
                
                let departMinute = currentMinute + spot.duration;
                let departHour = currentHour + Math.floor(departMinute / 60);
                departMinute = departMinute % 60;
                let departureTimeStr = `${String(departHour).padStart(2, '0')}:${String(departMinute).padStart(2, '0')}`;

                timelineHtml += `
                    <div class="timeline-item">
                        <div class="timeline-content">
                            <span class="time-tag">${arrivalTimeStr} - ${departureTimeStr}</span>
                            <strong style="display:block; margin-top:5px; font-size:1.1rem;">${index + 1}. ${spot.name}</strong>
                            ${!isOpenned ? `<div class="warning"><i class="fa-solid fa-triangle-exclamation"></i> ⚠️ 撲空警告：此時段非營業時間！(${spot.openTime} - ${spot.closeTime})</div>` : ''}
                            <small style="color: #666;">預計停留 ${spot.duration} 分鐘</small>
                        </div>
                        <div class="order-actions">
                            <button class="order-btn" onclick="moveSpot(${index}, -1)"><i class="fa-solid fa-chevron-up"></i></button>
                            <button class="order-btn" onclick="moveSpot(${index}, 1)"><i class="fa-solid fa-chevron-down"></i></button>
                        </div>
                    </div>
                `;

                // 預設景點間車程/移動時間為 20 分鐘
                currentMinute = departMinute + 20; 
                currentHour = departHour + Math.floor(currentMinute / 60);
                currentMinute = currentMinute % 60;
            });

            timelineHtml += `</div>`;
            document.getElementById('itinerary-result').innerHTML = timelineHtml;
            
            // 顯示功能按鈕
            document.getElementById('open-maps-btn').style.display = 'block';
            document.getElementById('download-jpg-btn').style.display = 'block';
        }

        // 移動行程順序（上下移動）
        function moveSpot(index, direction) {
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= spots.length) return; // 超出邊界不處理

            // 交換陣列元素
            const temp = spots[index];
            spots[index] = spots[targetIndex];
            spots[targetIndex] = temp;

            // 重新渲染清單與行程表
            renderSpotList();
            generateItinerary();
        }

        // 營業時間檢查
        function checkInOpeningHours(current, open, close) {
            const c = timeToMinutes(current);
            const o = timeToMinutes(open);
            const l = timeToMinutes(close);
            return c >= o && c <= l;
        }

        function timeToMinutes(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        // Google Maps 串聯多點導航
        function openGoogleMaps() {
            if (spots.length === 0) return;
            const baseUrl = "https://www.google.com/maps/dir/";
            const params = spots.map(spot => encodeURIComponent(spot.name)).join('/');
            window.open(baseUrl + params, '_blank');
        }

        // 另存 JPG 圖片功能
        function downloadItineraryJPG() {
            const target = document.getElementById('itinerary-card');
            
            // 使用 html2canvas 將指定的行程卡片區塊轉成 canvas
            html2canvas(target, {
                backgroundColor: "#FFFFFF",
                scale: 2, // 提高解析度，讓手機觀看更清晰
                useCORS: true
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/jpeg', 0.9);
                const tripDate = document.getElementById('trip-date').value || '行程表';
                
                // 建立虛擬下載連結
                const filename = `Map_Integration_${tripDate}.jpg`;
                const link = document.createElement('a');
                link.download = filename;
                link.href = imgData;
                link.click();
            });
        }
    </script>
</body>
</html>
