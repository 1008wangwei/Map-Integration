<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Integration - 輕鬆規劃行程，一鍵開始！</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --primary-color: #FFD966;
            --primary-light: #FFF9E6;
            --bg-color: #FCFBF7;
            --text-color: #5D534A;
            --card-bg: #FFFFFF;
            --accent-color: #E29578;
            --danger-color: #E63946;
            --success-color: #A3B18A;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background-color: var(--primary-light);
            padding: 25px 40px;
            border-radius: 20px;
            box-shadow: 0 8px 0 var(--primary-color);
            border: 3px solid var(--text-color);
            max-width: 600px;
            width: 100%;
        }

        header h1 {
            font-size: 2.2rem;
            color: var(--text-color);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        header p {
            font-size: 1.1rem;
            color: #7A6F64;
            font-weight: bold;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 25px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border: 3px solid var(--text-color);
            border-radius: 18px;
            padding: 20px;
            box-shadow: 5px 5px 0 var(--text-color);
        }

        h2 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px dashed var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 0.95rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--text-color);
            border-radius: 10px;
            font-size: 1rem;
            background-color: #FFF;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            background-color: var(--primary-light);
        }

        textarea {
            resize: vertical;
            height: 90px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            border: 2px solid var(--text-color);
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 var(--text-color);
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 var(--text-color);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--text-color);
        }

        .btn-text-only {
            background: none;
            border: none;
            box-shadow: none;
            color: var(--accent-color);
            padding: 0;
            width: auto;
            margin-top: 0;
            font-size: 0.9rem;
            text-decoration: underline;
        }
        .btn-text-only:hover { transform: none; box-shadow: none; filter: brightness(0.8); }

        .spot-list-item {
            background: var(--primary-light);
            border: 2px solid var(--text-color);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .spot-info-edit {
            flex-grow: 1;
        }

        .inline-select {
            width: auto;
            padding: 3px 5px;
            font-size: 0.8rem;
            border-radius: 6px;
            margin-top: 5px;
            display: inline-block;
        }

        .delete-btn {
            background: var(--danger-color);
            color: white;
            border: 2px solid var(--text-color);
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 2px 0 var(--text-color);
            width: auto;
            margin-top: 0;
        }

        /* 行程時間軸樣式 */
        .timeline-box {
            background: white;
            padding: 10px;
            border-radius: 12px;
        }

        .timeline {
            position: relative;
            padding-left: 20px;
            margin-top: 15px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 5px;
            top: 10px;
            bottom: 10px;
            width: 4px;
            background: var(--primary-color);
            border-radius: 2px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 25px;
            padding-left: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .timeline-item::before {
            content: '●';
            position: absolute;
            left: -20px;
            color: var(--accent-color);
            font-size: 1.2rem;
            background: var(--card-bg);
            z-index: 2;
        }

        .timeline-content {
            flex-grow: 1;
            padding-right: 10px;
        }

        .time-tag {
            background: var(--text-color);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .warning {
            color: var(--danger-color);
            font-weight: bold;
            font-size: 0.85rem;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 調整順序按鈕群組 */
        .order-actions {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .order-btn {
            background: white;
            border: 2px solid var(--text-color);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 0 2px 0 var(--text-color);
            width: auto;
            margin-top: 0;
        }
        .order-btn:hover { background: var(--primary-light); }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .maps-btn {
            background-color: #4285F4;
            color: white;
        }
        .maps-btn:hover { background-color: #357ae8; }

        .jpg-btn {
            background-color: var(--accent-color);
            color: white;
        }
        .jpg-btn:hover { filter: brightness(0.9); }

        .tip-text {
            font-size: 0.82rem;
            color: #888;
            margin-top: 4px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-compass" style="color: var(--accent-color);"></i> Map Integration</h1>
        <p>輕鬆規劃行程，一鍵開始！</p>
    </header>

    <div class="container">
        <div class="space-y" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="card">
                <h2><i class="fa-solid fa-calendar-days"></i> 1. 設定旅遊時間</h2>
                <div class="form-group">
                    <label for="trip-date">旅遊日期</label>
                    <input type="date" id="trip-date" value="2026-07-01" onchange="generateItinerary()">
                </div>
                <div class="row">
                    <div class="form-group">
                        <label for="start-time">出發時間</label>
                        <input type="time" id="start-time" value="09:00" onchange="generateItinerary()">
                    </div>
                    <div class="form-group">
                        <label for="drive-duration">預估景點間車程</label>
                        <select id="drive-duration" onchange="generateItinerary()">
                            <option value="15">15 分鐘 (近距離)</option>
                            <option value="25" selected>25 分鐘 (一般市區)</option>
                            <option value="45">45 分鐘 (跨區/郊區)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>
                    <span><i class="fa-solid fa-map-location-dot"></i> 2. 分析共用地圖景點</span>
                    <button class="btn-text-only" onclick="loadExample()">填入測試範例</button>
                </h2>
                
                <div class="form-group">
                    <label for="map-url">Google Map 共用地圖連結</label>
                    <input type="text" id="map-url" placeholder="請在此貼上您的 Google Map 分享連結">
                </div>

                <div class="form-group">
                    <label for="bulk-spots">請貼上從地圖導出的景點清單 (一行一個)</label>
                    <textarea id="bulk-spots" placeholder="例如：
台中歌劇院
太初麵食
成真咖啡館
逢甲夜市
綠宿行旅"></textarea>
                    <p class="tip-text">💡 <b>智慧排序功能：</b>匯入後可自由修正各景點的類別。系統會自動將飯店放至最終站，並提示三餐時間！</p>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>統一預設營業開始</label>
                        <input type="time" id="default-open" value="09:00">
                    </div>
                    <div class="form-group">
                        <label>統一預設營業結束</label>
                        <input type="time" id="default-close" value="21:30">
                    </div>
                </div>

                <button type="button" onclick="importAndAnalyzeSpots()"><i class="fa-solid fa-brain"></i> 分析地圖並匯入</button>
            </div>
        </div>

        <div class="space-y" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="card">
                <h2>
                    <span><i class="fa-solid fa-list-ul"></i> 智慧辨識與精細微調</span>
                    <button class="btn-text-only" style="color:var(--danger-color);" onclick="clearAllSpots()">一鍵清空</button>
                </h2>
                <div id="spot-list">
                    <p style="color: #999; text-align: center; padding: 20px;">尚未分析任何地圖景點</p>
                </div>
            </div>

            <div class="card" id="itinerary-card">
                <h2><i class="fa-solid fa-route"></i> Map Integration 行程路線表</h2>
                <div id="trip-info-header" style="margin-bottom: 10px; font-weight: bold; color: #7A6F64; display:none;"></div>
                
                <div id="itinerary-result" class="timeline-box">
                    <p style="color: #999; text-align: center; padding: 20px;">請匯入景點，行程表將自動動態生成！</p>
                </div>

                <div class="action-buttons">
                    <button id="open-maps-btn" class="maps-btn" style="display: none;" onclick="openGoogleMaps()"><i class="fa-solid fa-map-location-dot"></i> 一鍵開啟 Google Maps 導航</button>
                    <button id="download-jpg-btn" class="jpg-btn" style="display: none;" onclick="downloadItineraryJPG()"><i class="fa-solid fa-image"></i> 另存行程表圖 (JPG) 離線查看</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let spots = [];

        // 載入範例資料方便測試
        function loadExample() {
            document.getElementById('bulk-spots').value = "秋紅谷景觀公園\n太初麵食\n國家歌劇院\n成真咖啡館\n逢甲夜市\n綠宿行旅";
        }

        // 清空所有資料
        function clearAllSpots() {
            spots = [];
            renderSpotList();
            document.getElementById('itinerary-result').innerHTML = `<p style="color: #999; text-align: center; padding: 20px;">請匯入景點，行程表將自動動態生成！</p>`;
            document.getElementById('open-maps-btn').style.display = 'none';
            document.getElementById('download-jpg-btn').style.display = 'none';
            document.getElementById('trip-info-header').style.display = 'none';
        }

        // 智慧分析並匯入
        function importAndAnalyzeSpots() {
            const bulkText = document.getElementById('bulk-spots').value.trim();
            const openTime = document.getElementById('default-open').value;
            const closeTime = document.getElementById('default-close').value;

            if (!bulkText) {
                alert('請先貼上地圖景點清單！');
                return;
            }

            const lines = bulkText.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            spots = []; 

            lines.forEach(name => {
                let type = 'spot'; 
                let duration = 90; 

                if (/(餐廳|麵|飯|鍋|肉|料理|食堂|餐酒館|午餐|晚餐|鴨|吃)/.test(name)) {
                    type = 'food';
                    duration = 60; 
                } else if (/(咖啡|Cafe|cafe|甜點|下午茶|館)/.test(name)) {
                    type = 'coffee';
                    duration = 60;
                } else if (/(飯店|旅店|民宿|Hotel|hotel|居|宿|Motel)/.test(name)) {
                    type = 'hotel';
                    duration = 0;  
                }

                spots.push({
                    id: Date.now() + Math.random(),
                    name,
                    type,
                    openTime,
                    closeTime,
                    duration
                });
            });

            // 智慧權重初階排序（飯店移到最後）
            autoSortSpotsSmartly();
            renderSpotList();
            generateItinerary(); // 自動即時生成行程
        }

        function autoSortSpotsSmartly() {
            let hotels = spots.filter(s => s.type === 'hotel');
            let others = spots.filter(s => s.type !== 'hotel');
            spots = [...others, ...hotels];
        }

        // 刪除個別景點
        function deleteSpot(id) {
            spots = spots.filter(spot => spot.id !== id);
            renderSpotList();
            generateItinerary();
        }

        // 當使用者在列表手動更改景點屬性或時間時觸發
        function updateSpotField(id, field, value) {
            const spot = spots.find(s => s.id === id);
            if (spot) {
                if (field === 'duration') value = parseInt(value);
                spot[field] = value;
                generateItinerary(); // 即時動態重新計算所有排程與防撲空警告
            }
        }

        // 渲染左下微調面板
        function renderSpotList() {
            const listContainer = document.getElementById('spot-list');
            if (spots.length === 0) {
                listContainer.innerHTML = `<p style="color: #999; text-align: center; padding: 20px;">尚未分析任何地圖景點</p>`;
                return;
            }

            listContainer.innerHTML = spots.map(spot => `
                <div class="spot-list-item">
                    <div class="spot-info-edit">
                        <strong>${spot.name}</strong><br>
                        <select class="inline-select" onchange="updateSpotField(${spot.id}, 'type', this.value)">
                            <option value="spot" ${spot.type === 'spot' ? 'selected' : ''}>🎯 景點</option>
                            <option value="food" ${spot.type === 'food' ? 'selected' : ''}>🍔 美食餐廳</option>
                            <option value="coffee" ${spot.type === 'coffee' ? 'selected' : ''}>☕ 咖啡下午茶</option>
                            <option value="hotel" ${spot.type === 'hotel' ? 'selected' : ''}>🏨 飯店最終站</option>
                        </select>
                        <select class="inline-select" onchange="updateSpotField(${spot.id}, 'duration', this.value)">
                            <option value="30" ${spot.duration === 30 ? 'selected' : ''}>停留 30分</option>
                            <option value="60" ${spot.duration === 60 ? 'selected' : ''}>停留 1小時</option>
                            <option value="90" ${spot.duration === 90 ? 'selected' : ''}>停留 1.5小時</option>
                            <option value="120" ${spot.duration === 120 ? 'selected' : ''}>停留 2小時</option>
                            <option value="0" ${spot.duration === 0 ? 'selected' : ''}>落腳休息</option>
                        </select>
                    </div>
                    <button class="delete-btn" onclick="deleteSpot(${spot.id})"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        }

        // 即時動態排程核心演算法
        function generateItinerary() {
            if (spots.length === 0) return;

            const tripDate = document.getElementById('trip-date').value;
            const tripHeader = document.getElementById('trip-info-header');
            tripHeader.innerText = `旅遊日期：${tripDate}`;
            tripHeader.style.display = 'block';

            const startTimeInput = document.getElementById('start-time').value;
            const driveDuration = parseInt(document.getElementById('drive-duration').value);
            let [currentHour, currentMinute] = startTimeInput.split(':').map(Number);
            
            let timelineHtml = `<div class="timeline">`;
            
            spots.forEach((spot, index) => {
                let arrivalTimeStr = `${String(currentHour).padStart(2, '0')}:${String(currentMinute).padStart(2, '0')}`;
                const isOpenned = checkInOpeningHours(arrivalTimeStr, spot.openTime, spot.closeTime);
                
                // 智慧三餐時間段高亮提示
                let mealTip = "";
                if ((currentHour >= 11 && currentHour <= 14) && (spot.type !== 'food' && spot.type !== 'coffee')) {
                    mealTip = `<div style="color:var(--accent-color); font-size:0.85rem; font-weight:bold; margin-top:3px;"><i class="fa-solid fa-utensils"></i> 💡 提示：正值午餐時間，建議用右側按鈕與餐廳調換順序！</div>`;
                } else if ((currentHour >= 17 && currentHour <= 20) && (spot.type !== 'food' && spot.type !== 'coffee' && spot.type !== 'hotel')) {
                    mealTip = `<div style="color:var(--accent-color); font-size:0.85rem; font-weight:bold; margin-top:3px;"><i class="fa-solid fa-utensils"></i> 💡 提示：正值晚餐時間，建議用右側按鈕與餐廳調換順序！</div>`;
                }

                let departMinute = currentMinute + spot.duration;
                let departHour = currentHour + Math.floor(departMinute / 60);
                departMinute = departMinute % 60;
                let departureTimeStr = `${String(departHour).padStart(2, '0')}:${String(departMinute).padStart(2, '0')}`;

                timelineHtml += `
                    <div class="timeline-item">
                        <div class="timeline-content">
                            <span class="time-tag">${spot.type === 'hotel' ? '晚上最終站' : arrivalTimeStr + ' - ' + departureTimeStr}</span>
                            <strong style="display:block; margin-top:5px; font-size:1.1rem;">${index + 1}. ${spot.name}</strong>
                            ${!isOpenned ? `<div class="warning"><i class="fa-solid fa-triangle-exclamation"></i> ⚠️ 撲空警告：此時段非營業時間！(${spot.openTime} - ${spot.closeTime})</div>` : ''}
                            ${mealTip}
                            <small style="color: #666;">${spot.type === 'hotel' ? '抵達後辦理入住休息' : '預計停留 ' + spot.duration + ' 分鐘'}</small>
                        </div>
                        <div class="order-actions">
                            <button class="order-btn" onclick="moveSpot(${index}, -1)"><i class="fa-solid fa-chevron-up"></i></button>
                            <button class="order-btn" onclick="moveSpot(${index}, 1)"><i class="fa-solid fa-chevron-down"></i></button>
                        </div>
                    </div>
                `;

                // 動態加上使用者自訂的景點間車程
                currentMinute = departMinute + driveDuration; 
                currentHour = departHour + Math.floor(currentMinute / 60);
                currentMinute = currentMinute % 60;
            });

            timelineHtml += `</div>`;
            document.getElementById('itinerary-result').innerHTML = timelineHtml;
            
            document.getElementById('open-maps-btn').style.display = 'block';
            document.getElementById('download-jpg-btn').style.display = 'block';
        }

        // 上下移動順序
        function moveSpot(index, direction) {
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= spots.length) return;

            const temp = spots[index];
            spots[index] = spots[targetIndex];
            spots[targetIndex] = temp;

            renderSpotList();
            generateItinerary(); // 移動完立即動態重算時間
        }

        function checkInOpeningHours(current, open, close) {
            const c = timeToMinutes(current);
            const o = timeToMinutes(open);
            const l = timeToMinutes(close);
            return c >= o && c <= l;
        }

        function timeToMinutes(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        function openGoogleMaps() {
            if (spots.length === 0) return;
            const baseUrl = "https://www.google.com/maps/dir/";
            const params = spots.map(spot => encodeURIComponent(spot.name)).join('/');
            window.open(baseUrl + params, '_blank');
        }

        // 導出 JPG
        function downloadItineraryJPG() {
            const target = document.getElementById('itinerary-card');
            html2canvas(target, {
                backgroundColor: "#FFFFFF",
                scale: 2, 
                useCORS: true
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/jpeg', 0.95);
                const tripDate = document.getElementById('trip-date').value || '行程表';
                const link = document.createElement('a');
                link.download = `Map_Integration_${tripDate}.jpg`;
                link.href = imgData;
                link.click();
            });
        }
    </script>
</body>
</html>
