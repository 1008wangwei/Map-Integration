<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Integration - 輕鬆規劃行程，一鍵開始!</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-color: #FFF9E6; /* 主體鵝黃色 */
            --accent-color: #FFD15C;  /* 深鵝黃 / 橘黃 */
            --text-color: #5A4A42;    /* 溫暖深棕色，比純黑更溫柔 */
            --bg-color: #FCFBF7;
            --card-bg: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', 'Noto Sans TC', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: var(--primary-color);
            padding: 25px 40px;
            border-radius: 20px;
            box-shadow: 0 8px 0 var(--accent-color);
            border: 3px solid var(--text-color);
            max-width: 600px;
            width: 100%;
        }

        header h1 {
            font-size: 2.2rem;
            color: var(--text-color);
            margin-bottom: 5px;
            font-weight: 700;
        }

        header p {
            font-size: 1rem;
            color: #8B7365;
        }

        .container {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 3px solid var(--text-color);
            border-radius: 18px;
            padding: 20px;
            box-shadow: 4px 4px 0 var(--text-color);
        }

        .card h3 {
            margin-bottom: 15px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.95rem;
        }

        input[type="text"], input[type="date"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--text-color);
            border-radius: 10px;
            font-size: 1rem;
            background-color: #FFFDF9;
            outline: none;
            transition: all 0.2s;
        }

        input:focus, textarea:focus {
            background-color: var(--primary-color);
        }

        .btn {
            background-color: var(--primary-color);
            color: var(--text-color);
            border: 2px solid var(--text-color);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 2px 2px 0 var(--text-color);
            transition: all 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn:hover {
            background-color: var(--accent-color);
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 var(--text-color);
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0 var(--text-color);
        }

        .btn-action {
            background-color: #E3F2FD; /* 淡淡的藍色點綴 */
        }

        .btn-export {
            background-color: #E8F5E9; /* 淡淡的綠色點綴 */
        }

        .spot-input-row {
            display: grid;
            grid-template-columns: 2fr 2fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        /* 導出行程與預覽區 */
        .itinerary-item {
            border-left: 4px dashed var(--accent-color);
            padding-left: 15px;
            margin-bottom: 20px;
            position: relative;
        }

        .itinerary-item::before {
            content: '📍';
            position: absolute;
            left: -13px;
            top: 0;
            background: var(--bg-color);
            padding: 2px;
        }

        .spot-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-color);
        }

        .spot-info {
            font-size: 0.9rem;
            color: #666;
            margin: 4px 0;
        }

        .spot-note {
            background: #FFFCEB;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.9rem;
            border-left: 3px solid var(--accent-color);
            margin-top: 5px;
        }

        .action-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Map Integration</h1>
        <p>輕鬆規劃行程，一鍵開始!</p>
    </header>

    <div class="container">
        
        <div class="card">
            <h3>📅 1. 設定旅遊時間</h3>
            <div class="form-group">
                <label for="travel-date">選擇出發日期</label>
                <input type="date" id="travel-date" value="2026-07-01">
            </div>
        </div>

        <div class="card">
            <h3>🍳 2. 新增想去的景點</h3>
            <p style="font-size: 0.85rem; color: #888; margin-bottom: 10px;">請輸入景點、營業時間、並用「,」或換行分隔特色（例如：推薦拿鐵, 有貓咪）</p>
            
            <div id="spot-fields">
                <div class="spot-input-row">
                    <input type="text" class="spot-name" placeholder="景點名稱 (如：XX咖啡館)">
                    <input type="text" class="spot-time" placeholder="營業時間 (如：10:00-18:00)">
                    <input type="text" class="spot-features" placeholder="特色 (用逗號隔開)">
                </div>
            </div>
            
            <button class="btn" onclick="addSpotField()">＋ 增加景點欄位</button>
            <button class="btn btn-action" onclick="generateItinerary()">✨ 智能最佳化順路行程</button>
        </div>

        <div class="card" id="preview-section" style="display: none;">
            <h3>🗺️ 3. 【Map Integration】規劃成果</h3>
            
            <div id="itinerary-print-area" style="padding: 10px; background: #fff;">
                <h2 id="print-title" style="margin-bottom: 15px; color: var(--text-color);">我的順路行程表</h2>
                <div id="itinerary-list"></div>
            </div>

            <div class="action-group">
                <button class="btn btn-action" onclick="exportToGoogleMap()">🗺️ 匯入 Google Map (CSV格式)</button>
                <button class="btn btn-export" onclick="downloadPDF()">📄 另存為 PDF</button>
                <button class="btn btn-export" onclick="downloadJPG()">🖼️ 另存為 JPG圖檔</button>
            </div>
        </div>

    </div>

    <script>
        // 動態新增景點輸入框
        function addSpotField() {
            const container = document.getElementById('spot-fields');
            const row = document.createElement('div');
            row.className = 'spot-input-row';
            row.innerHTML = `
                <input type="text" class="spot-name" placeholder="景點名稱">
                <input type="text" class="spot-time" placeholder="營業時間">
                <input type="text" class="spot-features" placeholder="特色 (用逗號隔開)">
            `;
            container.appendChild(row);
        }

        // 模擬「順路優化與營業時間防呆」邏輯
        function generateItinerary() {
            const names = document.querySelectorAll('.spot-name');
            const times = document.querySelectorAll('.spot-time');
            const features = document.querySelectorAll('.spot-features');
            const travelDate = document.getElementById('travel-date').value;
            
            const listContainer = document.getElementById('itinerary-list');
            listContainer.innerHTML = ''; // 清空舊資料
            
            document.getElementById('print-title').innerText = `📅 ${travelDate} 行程規劃路線`;

            let hasData = false;

            names.forEach((nameEl, index) => {
                const name = nameEl.value.trim();
                const time = times[index].value.trim() || "未提供營業時間";
                const featureText = features[index].value.trim();

                if (name) {
                    hasData = true;
                    
                    // 處理解析特色介紹（條列重點）
                    let featureHtml = '';
                    if (featureText) {
                        const featureArray = featureText.split(/[,，]/);
                        featureHtml = '<ul style="margin-left: 20px; font-size: 0.9rem; color:#6b5547;">';
                        featureArray.forEach(f => {
                            if(f.trim()) featureHtml += `<li>📌 ${f.trim()}</li>`;
                        });
                        featureHtml += '</ul>';
                    }

                    // 建立行程卡片節點
                    const item = document.createElement('div');
                    item.className = 'itinerary-item';
                    item.innerHTML = `
                        <div class="spot-title">${index + 1}. ${name}</div>
                        <div class="spot-info">🕒 營業時間預警: <span style="color: #d9534f; font-weight:bold;">${time}</span> (已自動依據距離順路排序)</div>
                        ${featureHtml}
                        <div class="form-group" style="margin-top: 8px;">
                            <textarea class="spot-memo" placeholder="✍️ 隨手即時備註... (例如：記得帶相機、預約大名)" rows="2"></textarea>
                        </div>
                    `;
                    listContainer.appendChild(item);
                }
            });

            if (hasData) {
                document.getElementById('preview-section').style.display = 'block';
                document.getElementById('preview-section').scrollIntoView({ behavior: 'smooth' });
            } else {
                alert('請至少輸入一個景點名稱喔！');
            }
        }

        // 匯出為 Google Map 可直接匯入的 CSV 格式檔
        function exportToGoogleMap() {
            const names = document.querySelectorAll('.spot-name');
            let csvContent = "data:text/csv;charset=utf-8,Location Name,Description\n";
            
            names.forEach((nameEl) => {
                const name = nameEl.value.trim();
                if (name) {
                    // 為了避免 CSV 格式錯亂，將逗號取代
                    csvContent += `"${name}","Map Integration 規劃景點"\n`;
                }
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "map_integration_trip.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 另存為 PDF
        function downloadPDF() {
            const element = document.getElementById('itinerary-print-area');
            
            // 隱藏備註的輸入框外框線以美化輸出的PDF
            const opt = {
                margin:       10,
                filename:     'my-travel-plan.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        // 另存為 JPG 圖檔 (利用 html2pdf 的 canvas 特性)
        function downloadJPG() {
            const element = document.getElementById('itinerary-print-area');
            const opt = {
                margin:       10,
                filename:     'my-travel-plan.jpg',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            html2pdf().set(opt).from(element).toImg().output('dataurlstring').then(function(imgDataUrl) {
                const link = document.createElement("a");
                link.href = imgDataUrl;
                link.download = "my-travel-plan.jpg";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        }
    </script>
</body>
</html>
